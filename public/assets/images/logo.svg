<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED;color:#7C3AED"/>
    </linearGradient>
  </defs>
  
  <!-- Hintergrund -->
  <rect width="200" height="200" rx="40" fill="url(#logoGradient)"/>
  
  <!-- Shop-Icon (Warenkorb) -->
  <g transform="translate(100, 100) scale(0.7)">
    <path d="M10,30 L30,30 L30,10 L45,10 L45,30 L70,30 L70,25 L70,20 L65,15 L60,20 L60,25 L60,5 L45,5 L45,15 L40,10 L35,15 L35,5 L20,5 L20,25 L20,30 Z" 
          fill="white" opacity="0.9"/>
    <circle cx="35" cy="40" r="8" fill="white" opacity="0.9"/>
    <circle cx="55" cy="40" r="8" fill="white" opacity="0.9"/>
    <line x1="30" y1="50" x2="70" y2="50" stroke="white" stroke-width="6" opacity="0.9"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="170" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif" font-weight="bold">COMMUNITY SHOP</text>
</svg>
